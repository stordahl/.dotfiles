prSections:
- title: Stylitics Apps
  filters: is:open repo:stylitics/apps
- title: embd
  filters: is:open repo:stordahl/embd
- title: All Pull Requests
  filters: is:open author:@me
- title: Needs My Review
  filters: is:open review-requested:@me
issuesSections:
- title: My Issues
  filters: is:open author:@me
- title: Assigned
  filters: is:open assignee:@me
- title: Involved
  filters: is:open involves:@me -author:@me
defaults:
  preview:
    open: true
    width: 50
  prsLimit: 20
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        width: 15
      author:
        width: 15
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
keybindings:
  prs: 
    - key: enter
      command: open https://github.com/{{.RepoName}}/pull/{{.PrNumber}}
repoPaths: {}
pager:
  diff: ""
